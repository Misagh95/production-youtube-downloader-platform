version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytdl-api
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - downloads:/app/data/files
      - tmp:/app/data/tmp
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - DOWNLOAD_DIR=/app/data/files
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytdl-bot
    command: ["python", "-m", "ytdl_platform.main", "bot"]
    volumes:
      - downloads:/app/data/files
      - tmp:/app/data/tmp
    env_file:
      - .env
    environment:
      - DOWNLOAD_DIR=/app/data/files
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  cleanup:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ytdl-cleanup
    command: ["python", "-m", "ytdl_platform.main", "cleanup"]
    volumes:
      - downloads:/app/data/files
      - tmp:/app/data/tmp
    env_file:
      - .env
    environment:
      - DOWNLOAD_DIR=/app/data/files
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  downloads:
  tmp:
